<!DOCTYPE html>
<html lang="en">
<head>
  <title>Nearby Chat</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <header>
      <div class="header-inner">
        <span class="logo">◎ Nearby Chat</span>
        <div class="status-dot"></div>
      </div>
      <!-- Username set on first load -->
      <div id="name-bar">
        <input id="username" placeholder="Enter your name to join..." maxlength="24" autocomplete="off" />
        <button id="joinBtn" onclick="setUsername()">Join</button>
      </div>
      <div id="user-label" class="user-label hidden"></div>
    </header>

    <div id="chat" class="chat-area">
      <div class="welcome-msg">👋 Say something to people nearby...</div>
    </div>

    <div class="input-area">
      <input id="messageInput" placeholder="Type a message..." autocomplete="off" disabled />
      <button id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
