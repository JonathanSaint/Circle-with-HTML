<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= POPUPS ================= -->

<!-- Login Popup -->
<div id="loginPopup" class="popup-overlay">
    <div class="popup-box">
        <h2>Login to Circle</h2>

        <form id="loginForm">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <button class="close-btn">Close</button>
    </div>
</div>

<!-- Signup Popup -->
<div id="signupPopup" class="popup-overlay">
    <div class="popup-box">
        <h2>Create an Account</h2>

        <form id="signupForm">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit-btn">Sign Up</button>
        </form>

        <button class="close-btn">Close</button>
    </div>
</div>

<!-- ================= PAGE CONTENT ================= -->

<div class="animated-bg">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">
    <div class="logo">
        <div class="circle-icon"></div>
    </div>

    <h1 class="title">Circle</h1>
    <p class="tagline">Real people. Real posts. Real connection.</p>

    <div class="buttons">
        <button class="email-btn">Continue with Email</button>
        <button class="login-full">Log in into Your Account</button>
    </div>
</div>

<section class="about-section">
    <h2>What is Circle?</h2>
    <p>Circle is a modern social platform built for real connections...</p>
    <p>No fake popularity. No manipulation.</p>
    <p>Made for students, teachers and workmates.</p>
</section>

<footer class="custom-footer fade-in">
    <p>Built with love by <span class="myname">Jonathan Arinda</span></p>
</footer>
</body>
</html>
