<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle</title>
    <!--ICONSCOUT CDN-->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.6/css/unicons.css">
    <!--STYLE SHEET-->
    <link rel="stylesheet" href="Homefeed.css">
</head>
<body>
     <!-- Animated background elements 
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
-->
   <nav>
    <div class="container">
        <h2 class="logo">Circle</h2>
        <div class="search-bar">
            <i class="uil uil-search"></i>
            <input type="search" placeholder="Search for friends, posts or videos">
    </div>
    <div class="create">
        <label class="btn btn-primary" for ="create-post">Create Post</label>
        <div class="profile-photo">
            <img src="images/user-1.jpg">
        </div>
    </div>
   </nav>

   <!--------- main ---------->
   <main>
    <div class="container">
         /* Left sidebar content */
        <div class="left">
         <a class="profile">
            <div class="profile-photo">
                <img src="images/user-1.jpg">
            </div>
            <div class="handle">
                <h4>John Doe</h4>
                <p class="text-muted">@saint</p>
            </div>
         </a>

         <!-- side bar-->
          <div class="sidebar">
            <a class="menu-item">
                <span><i class="uil uil-home"></i></span><h3>Home</h3>
                <span><i class="uil uil-home"></i></span><h3>Explore</h3>
                <span><i class="uil uil-home"></i></span><h3>Notifications</h3>
                <span><i class="uil uil-home"></i></span><h3>Messages</h3>
                <span><i class="uil uil-home"></i></span><h3>Bookmarks</h3>
                <span><i class="uil uil-home"></i></span><h3>Analytics</h3>
                <span><i class="uil uil-home"></i></span><h3>Theme</h3>
                <span><i class="uil uil-home"></i></span><h3>Settings</h3>
            </a>
          </div>
        </div>

        <!-- middle feed content -->
        <div class="middle">
        </div>
        <!-- right sidebar content -->
        <div class="right">
        
        </div>
    </div>
   </main>
</body>
</html>
