<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <div class="circle-icon"></div>
        </div>

        <!-- Title -->
        <h1 class="title">Circle</h1>

        <!-- Tagline -->
        <p class="tagline">Real people. Real posts. Real connection.</p>

        <!-- Buttons -->
        <div class="buttons">

            <button class="email-btn">Continue with Email</button>

            <div class="social-row">
                <button class="social-btn google">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="google">
                </button>
                <button class="social-btn apple">
                    <img src="https://www.svgrepo.com/show/303128/apple-logo.svg" alt="apple">
                </button>
                <button class="social-btn facebook">
                    <img src="https://www.svgrepo.com/show/448224/facebook.svg" alt="facebook">
                </button>
            </div>

            <button class="facebook-full">Facebook</button>
        </div>

        <!-- Footer -->
        <p class="footer">Already have an account? <a href="#">Log in</a></p>

    </div>

</body>
</html>
